<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ANTINA SERVER | Premium Dark Neon Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #050505;
            font-family: 'Poppins', 'Segoe UI', 'Orbitron', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            width: 100%;
            max-width: 580px;
            background: rgba(5, 5, 5, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            border: 1px solid rgba(255, 26, 26, 0.4);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6);
            z-index: 2;
            padding: 1.8rem 1.5rem;
            transition: all 0.3s;
        }

        .logo-wrapper {
            text-align: center;
            margin-bottom: 1rem;
        }
        .logo-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ff1a1a;
            box-shadow: 0 0 20px rgba(255, 26, 26, 0.6);
        }

        .typing-area {
            text-align: center;
            margin: 0.5rem 0 1.5rem;
        }
        .typing-text {
            font-size: 1.6rem;
            font-weight: 800;
            font-family: 'Orbitron', monospace;
            color: #ff1a1a;
            text-shadow: 0 0 8px #ff1a1a;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .cursor-blink {
            animation: blinkCursor 1s step-end infinite;
        }
        @keyframes blinkCursor {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .price-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 1rem 0 1.2rem;
        }
        .price-chip {
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid rgba(255, 26, 26, 0.5);
            border-radius: 60px;
            padding: 6px 14px;
            font-size: 0.75rem;
            font-weight: bold;
            color: #ffcccc;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .price-chip:hover {
            background: #ff1a1a20;
            border-color: #ff1a1a;
            transform: translateY(-2px);
            box-shadow: 0 0 8px #ff1a1a;
        }
        .price-chip span {
            color: #ff1a1a;
            font-weight: 800;
        }

        .glass-input {
            width: 100%;
            background: rgba(15, 15, 15, 0.9);
            border: 1.5px solid rgba(255, 26, 26, 0.5);
            border-radius: 50px;
            padding: 0.9rem 1.2rem;
            font-size: 0.9rem;
            color: white;
            outline: none;
        }
        .glass-input:focus {
            border-color: #ff1a1a;
            box-shadow: 0 0 12px #ff1a1a80;
        }
        .btn-neon {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 26, 26, 0.1);
            border: 1.5px solid #ff1a1a;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            letter-spacing: 2px;
            color: #ff1a1a;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .btn-neon:hover {
            background: #ff1a1a;
            color: #050505;
            box-shadow: 0 0 18px #ff1a1a;
        }
        .secondary-btn {
            background: transparent;
            border-color: #ff1a1a80;
        }
        .error-msg {
            color: #ff3a3a;
            font-size: 0.75rem;
            text-align: center;
            margin-top: 0.5rem;
            font-weight: bold;
        }
        .shake {
            animation: shakeAnim 0.3s ease-in-out 0s 2;
        }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .status-card {
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 1rem;
            margin: 1rem 0;
            border: 1px solid rgba(255, 26, 26, 0.3);
        }
        .countdown-glow {
            font-size: 1.6rem;
            font-weight: 800;
            font-family: monospace;
            background: linear-gradient(135deg, #ff5e5e, #ff1a1a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
        }
        .seconds-value {
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            color: #ff1a1a;
            text-shadow: 0 0 10px #ff1a1a;
            margin: 6px 0;
        }
        input[type="range"] {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            background: #2a2a2a;
            border-radius: 5px;
        }
        input[type="range"]::-webkit-slider-thumb {
            width: 18px;
            height: 18px;
            background: #ff1a1a;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px red;
        }
        .history-list {
            max-height: 210px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .history-item {
            background: #0f0f0fcc;
            border-left: 3px solid #ff1a1a;
            border-radius: 16px;
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }
        .history-item.completed {
            opacity: 0.6;
            border-left-color: #777;
        }
        .attack-status {
            font-weight: bold;
            font-size: 0.7rem;
            background: #ff1a1a30;
            padding: 4px 10px;
            border-radius: 30px;
        }
        .logout-btn {
            width: auto;
            padding: 0.4rem 1rem;
            font-size: 0.7rem;
            margin: 0;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .hidden-page {
            display: none;
        }
        .title-sm {
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: #ffaaaa;
            margin-bottom: 8px;
        }
        .attack-blocked {
            opacity: 0.6;
            pointer-events: none;
        }
        .pulse-attack {
            animation: attackPulse 0.45s ease-out;
        }
        @keyframes attackPulse {
            0% { box-shadow: 0 0 0 0 #ff1a1a; border-color: #ff1a1a; }
            70% { box-shadow: 0 0 0 12px rgba(255,26,26,0); }
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .warning-text {
            color: #ff8888;
            font-size: 0.7rem;
            text-align: center;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    <div class="app-container">
        <!-- LOGIN PAGE -->
        <div id="loginPage">
            <div class="logo-wrapper">
                <img src="https://i.postimg.cc/kG0vjjBK/file-00000000009c7209a084897cd4b72664.png" class="logo-img" alt="ANTINA">
            </div>
            <div class="typing-area">
                <div class="typing-text" id="typingTitle"></div>
            </div>

            <!-- PRICE ROW (INR) -->
            <div class="price-row">
                <div class="price-chip" data-plan="199 INR - 60 Days (Max 300s)">💰 <span>199₹</span> 60D/300s</div>
                <div class="price-chip" data-plan="250 INR - Permanent (Max 300s)">🔥 <span>250₹</span> PERM/300s</div>
                <div class="price-chip" data-plan="250 INR - 60 Days (Max 700s)">⚡ <span>250₹</span> 60D/700s</div>
                <div class="price-chip" data-plan="299 INR - Permanent (Max 700s)">💎 <span>299₹</span> PERM/700s</div>
            </div>

            <input type="text" id="accessKeyInput" class="glass-input" placeholder="ENTER ACCESS KEY" autocomplete="off">
            <button id="confirmLoginBtn" class="btn-neon">✓ CONFIRM</button>
            <button id="buyKeyBtn" class="btn-neon secondary-btn">🛒 BUY KEY</button>
            <div id="loginError" class="error-msg"></div>
        </div>

        <!-- DASHBOARD PAGE -->
        <div id="dashboardPage" class="hidden-page">
            <div class="flex-between">
                <img src="https://i.postimg.cc/kG0vjjBK/file-00000000009c7209a084897cd4b72664.png" style="width:45px; height:45px; border-radius:50%; border:1px solid red;">
                <button id="logoutDashboardBtn" class="btn-neon logout-btn">⤫ LOGOUT</button>
            </div>
            <div class="status-card">
                <div class="title-sm">🔐 KEY STATUS</div>
                <div id="remainingTimeDashboard" class="countdown-glow">--d --h --m --s</div>
            </div>
            <div class="status-card" id="attackPanelCard">
                <div class="title-sm">🎯 ATTACK PANEL</div>
                <input type="range" id="attackSlider" min="10" max="300" value="60">
                <div id="sliderSecondsDisplay" class="seconds-value">60 SECONDS</div>
                <button id="confirmAttackBtn" class="btn-neon">⚡ CONFIRM ATTACK</button>
                <div id="attackWarning" class="warning-text"></div>
            </div>
            <div class="status-card">
                <div class="title-sm">📜 ATTACK HISTORY</div>
                <div id="historyList" class="history-list">
                    <div style="text-align:center; color:#aaa;">— No attacks —</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const loginPage = document.getElementById('loginPage');
        const dashboardPage = document.getElementById('dashboardPage');
        const typingDiv = document.getElementById('typingTitle');
        const accessInput = document.getElementById('accessKeyInput');
        const confirmLoginBtn = document.getElementById('confirmLoginBtn');
        const buyKeyBtn = document.getElementById('buyKeyBtn');
        const errorDiv = document.getElementById('loginError');
        const attackSlider = document.getElementById('attackSlider');
        const sliderSecondsDisplay = document.getElementById('sliderSecondsDisplay');
        const confirmAttackBtn = document.getElementById('confirmAttackBtn');
        const historyContainer = document.getElementById('historyList');
        const remainingSpan = document.getElementById('remainingTimeDashboard');
        const logoutBtn = document.getElementById('logoutDashboardBtn');
        const attackWarningSpan = document.getElementById('attackWarning');
        const attackPanelCard = document.getElementById('attackPanelCard');

        // State
        let currentKeyData = null;
        let globalCountdownInterval = null;
        let activeAttackInterval = null;
        let isAttackRunning = false;
        let currentAttackTimeout = null;

        // Valid Keys Database
        const validKeys = {
            "ANTINA_60D_300S": { days: 60, maxSec: 300 },
            "ANTINA_PERMANET_300S": { days: 6000, maxSec: 300 },
            "ANTINA_60D_700S": { days: 60, maxSec: 700 },
            "ANTINA_PERMANENT_700S": { days: 60000, maxSec: 700 }
        };

        // Sound Effect
        function playSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                oscillator.connect(gain);
                gain.connect(audioCtx.destination);
                oscillator.type = 'sine';
                oscillator.frequency.value = 880;
                gain.gain.value = 0.1;
                oscillator.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.2);
                oscillator.stop(audioCtx.currentTime + 0.2);
                audioCtx.resume();
            } catch(e) { console.log('Audio not supported'); }
        }

        function visualEffect(element) {
            if(!element) return;
            element.style.transform = 'scale(0.95)';
            setTimeout(() => { if(element) element.style.transform = ''; }, 100);
        }

        // Price Chip: Redirect to Telegram with auto message
        document.querySelectorAll('.price-chip').forEach(chip => {
            chip.addEventListener('click', (e) => {
                e.stopPropagation();
                const planText = chip.getAttribute('data-plan') || chip.innerText;
                const message = `hey antina bro i need ${planText} please send me qr`;
                const encodedMsg = encodeURIComponent(message);
                window.open(`https://t.me/antinaseller?text=${encodedMsg}`, '_blank');
                playSound();
                visualEffect(chip);
            });
        });

        // Login Logic
        function handleLogin(keyValue) {
            const key = keyValue.trim();
            const keyData = validKeys[key];
            
            if(!keyData) {
                playSound();
                errorDiv.innerText = "❌ INVALID ACCESS KEY";
                accessInput.classList.add('shake');
                setTimeout(() => {
                    accessInput.classList.remove('shake');
                    errorDiv.innerText = "";
                }, 1500);
                return false;
            }

            const expiryTime = Date.now() + (keyData.days * 24 * 60 * 60 * 1000);
            localStorage.setItem('antina_key', key);
            localStorage.setItem('antina_expiry', expiryTime);
            localStorage.setItem('antina_maxSeconds', keyData.maxSec);
            
            currentKeyData = {
                maxSeconds: keyData.maxSec,
                expiryTimestamp: expiryTime
            };
            
            playSound();
            visualEffect(confirmLoginBtn);
            showDashboard();
            return true;
        }

        // Auto Login Check
        function checkAutoLogin() {
            const savedKey = localStorage.getItem('antina_key');
            const savedExpiry = localStorage.getItem('antina_expiry');
            const savedMax = localStorage.getItem('antina_maxSeconds');
            
            if(savedKey && savedExpiry && savedMax) {
                const expiryNum = parseInt(savedExpiry);
                if(Date.now() < expiryNum) {
                    currentKeyData = {
                        maxSeconds: parseInt(savedMax),
                        expiryTimestamp: expiryNum
                    };
                    showDashboard();
                    return true;
                } else {
                    // Expired - clear storage
                    localStorage.removeItem('antina_key');
                    localStorage.removeItem('antina_expiry');
                    localStorage.removeItem('antina_maxSeconds');
                }
            }
            return false;
        }

        // Logout
        function logout() {
            playSound();
            localStorage.removeItem('antina_key');
            localStorage.removeItem('antina_expiry');
            localStorage.removeItem('antina_maxSeconds');
            
            if(globalCountdownInterval) clearInterval(globalCountdownInterval);
            stopCurrentAttack();
            currentKeyData = null;
            showLogin();
            accessInput.value = '';
        }

        // Stop current attack
        function stopCurrentAttack() {
            if(activeAttackInterval) {
                clearInterval(activeAttackInterval);
                activeAttackInterval = null;
            }
            if(currentAttackTimeout) {
                clearTimeout(currentAttackTimeout);
                currentAttackTimeout = null;
            }
            isAttackRunning = false;
            if(confirmAttackBtn) confirmAttackBtn.disabled = false;
            if(attackPanelCard) attackPanelCard.classList.remove('attack-blocked');
        }

        // Add attack to history with live countdown
        function addAttackToHistory(durationSeconds) {
            // Remove placeholder if exists
            if(historyContainer.children.length === 1 && historyContainer.children[0].innerText.includes("No attacks")) {
                historyContainer.innerHTML = '';
            }
            
            let remaining = durationSeconds;
            const historyItem = document.createElement('div');
            historyItem.className = 'history-item';
            historyItem.innerHTML = `
                <div>
                    <strong>⚔️ ATTACK</strong> (${durationSeconds}s)<br>
                    <small class="attack-timer">${remaining}s remaining</small>
                </div>
                <div><span class="attack-status">RUNNING</span></div>
            `;
            historyContainer.prepend(historyItem);
            
            // Limit history items
            while(historyContainer.children.length > 8) {
                historyContainer.removeChild(historyContainer.lastChild);
            }
            
            const timerSpan = historyItem.querySelector('.attack-timer');
            const statusSpan = historyItem.querySelector('.attack-status');
            
            const interval = setInterval(() => {
                if(remaining > 0) {
                    remaining--;
                    if(timerSpan) timerSpan.textContent = `${remaining}s remaining`;
                }
                if(remaining <= 0) {
                    clearInterval(interval);
                    if(statusSpan) {
                        statusSpan.textContent = 'COMPLETED';
                        statusSpan.style.background = '#333';
                    }
                    historyItem.classList.add('completed');
                    if(activeAttackInterval === interval) activeAttackInterval = null;
                }
            }, 1000);
            
            activeAttackInterval = interval;
            return interval;
        }

        // Start new attack (only one at a time)
        function startAttack(seconds) {
            if(isAttackRunning) {
                attackWarningSpan.textContent = "⚠️ Another attack is already running! Wait.";
                setTimeout(() => {
                    if(attackWarningSpan) attackWarningSpan.textContent = "";
                }, 2000);
                playSound();
                return false;
            }
            
            // Lock attack
            isAttackRunning = true;
            confirmAttackBtn.disabled = true;
            attackPanelCard.classList.add('attack-blocked');
            attackWarningSpan.textContent = "🔥 ATTACK IN PROGRESS...";
            
            // Add to history
            addAttackToHistory(seconds);
            
            // Set timeout to release lock
            currentAttackTimeout = setTimeout((
